# Whisper Dictate config. All fields are optional; defaults are used when absent.

# Push-to-talk hotkey. Use any pynput Key name (ctrl_r, ctrl_l, alt_r, f9, menu, etc.).
hotkey = "ctrl_r"

# Microphone device index. Leave commented to use the system default.
# Run this to list devices: python -c "import sounddevice; print(sounddevice.query_devices())"
mic_device = 23

# Auto-unmute the default input device on app start (and raise its volume if low).
# Prevents the "Whisper hallucinates 'thank you'" failure mode when the mic is muted at the OS level.
auto_unmute_mic = true
min_mic_volume = 0.6

# Subtle beeps when recording starts/stops.
enable_beeps = true

# Windows toast notifications on API errors.
enable_toasts = true

# Rolling log file path.
log_path = "whisper-dictate.log"

# Pad recordings shorter than this with trailing silence (Groq's segment minimum).
min_audio_seconds = 1.0

# Override the LLM polish prompt. Empty string = use the built-in default.
custom_system_instruction = ""
output_mode = "type"

# Polish mode — selects which LLM prompt to use. Built-in modes:
#   "default"      — cleanup + clarity (strip fillers, fix grammar)
#   "email"        — formal-ish, paragraphs, suitable for an email body
#   "chat"         — short, casual, conversational
#   "code"         — preserves technical terms and symbols, light fixes only
#   "translate_en" — translates the input to English
#   "raw"          — skips the LLM entirely, outputs the Whisper transcript as-is
# Tray menu also lets you switch modes at runtime.
polish_mode = "default"

# Optional: override built-in prompts or add your own modes here.
# [polish_modes]
# my_custom = """Your prompt..."""
